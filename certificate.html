<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate — DecentraForce</title>
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<link rel="icon" type="image/png" href="/assets/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #050a18; --surface: #0d1630; --accent: #00e5ff; --accent2: #7b5cff;
    --accent3: #ff4d8d; --gold: #d4af37; --text: #e8eeff; --muted: #7d8fb3;
    --border: rgba(0, 229, 255, 0.12);
  }
  body {
    font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text);
    min-height: 100vh; padding: 32px 16px 60px; line-height: 1.6;
  }
  .blob { position: fixed; border-radius: 50%; filter: blur(130px); pointer-events: none; z-index: 0; }
  .blob-1 { width: 560px; height: 560px; background: rgba(123,92,255,.16); top: -180px; right: -120px; }
  .blob-2 { width: 460px; height: 460px; background: rgba(0,229,255,.10); bottom: 40px; left: -140px; }

  .wrap { position: relative; z-index: 1; max-width: 920px; margin: 0 auto; }

  .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; flex-wrap: wrap; gap: 14px; }
  .logo { display: inline-flex; align-items: center; gap: 10px; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.15rem; color: var(--text); text-decoration: none; }
  .logo-icon { width: 34px; height: 34px; border-radius: 8px; background: linear-gradient(135deg, var(--accent2), var(--accent)); display: grid; place-items: center; font-size: .72rem; font-weight: 900; color: #fff; box-shadow: 0 0 18px rgba(123,92,255,.5); }
  .logo span { color: var(--accent); }

  .verify-banner {
    display: flex; align-items: center; gap: 10px; padding: 11px 18px; border-radius: 12px;
    font-size: .9rem; font-weight: 600; margin-bottom: 22px;
  }
  .verify-banner.ok    { background: rgba(0,229,153,.10); border: 1px solid rgba(0,229,153,.35); color: #00e599; }
  .verify-banner.bad   { background: rgba(255,77,141,.10); border: 1px solid rgba(255,77,141,.35); color: #ff7da8; }
  .verify-banner.load  { background: var(--surface); border: 1px solid var(--border); color: var(--muted); }

  /* ── The certificate paper ── */
  .cert {
    position: relative; background: linear-gradient(160deg, #fbfaf5 0%, #f3f0e6 100%);
    color: #1a2238; border-radius: 16px; padding: 54px 60px; overflow: hidden;
    box-shadow: 0 40px 90px rgba(0,0,0,.55);
    border: 1px solid rgba(212,175,55,.4);
  }
  .cert::before {
    content: ''; position: absolute; inset: 16px; border: 2px solid rgba(212,175,55,.55);
    border-radius: 8px; pointer-events: none;
  }
  .cert::after {
    content: ''; position: absolute; inset: 22px; border: 1px solid rgba(123,92,255,.25);
    border-radius: 6px; pointer-events: none;
  }
  .cert-inner { position: relative; z-index: 2; text-align: center; }

  .cert-brand { display: inline-flex; align-items: center; gap: 10px; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem; color: #1a2238; letter-spacing: -.3px; }
  .cert-brand .cb-icon { width: 32px; height: 32px; border-radius: 7px; background: linear-gradient(135deg, var(--accent2), var(--accent)); color: #fff; display: grid; place-items: center; font-size: .7rem; font-weight: 900; }
  .cert-brand .cb-accent { background: linear-gradient(135deg, #7b5cff, #00b8cc); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }

  .cert-kicker { margin-top: 26px; font-size: .78rem; letter-spacing: .32em; text-transform: uppercase; color: #9a7d2e; font-weight: 700; }
  .cert-title { font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 2.7rem; line-height: 1.1; margin-top: 6px; color: #1a2238; }
  .cert-sub { margin-top: 22px; font-size: .95rem; color: #5b6480; }
  .cert-name { font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 2.4rem; margin: 10px auto 8px; color: #2a1d5e;
    display: inline-block; padding: 0 18px 8px; border-bottom: 2px solid rgba(212,175,55,.6); min-width: 280px; }
  .cert-sub2 { font-size: .95rem; color: #5b6480; margin-top: 12px; }
  .cert-course { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.45rem; margin-top: 8px; color: #1a2238; max-width: 600px; margin-left: auto; margin-right: auto; }

  .cert-footer { display: flex; align-items: flex-end; justify-content: space-between; margin-top: 40px; gap: 24px; }
  .cert-meta { text-align: left; }
  .cert-meta .cm-label { font-size: .68rem; letter-spacing: .15em; text-transform: uppercase; color: #9aa0b0; font-weight: 700; }
  .cert-meta .cm-value { font-size: .9rem; color: #1a2238; font-weight: 600; margin-top: 2px; }
  .cert-seal {
    width: 92px; height: 92px; border-radius: 50%; flex-shrink: 0;
    background: radial-gradient(circle at 50% 40%, #ffe9a8, #d4af37 70%);
    display: grid; place-items: center; text-align: center; color: #6b520f;
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: .56rem; line-height: 1.25;
    box-shadow: 0 6px 20px rgba(212,175,55,.4), inset 0 0 0 4px rgba(255,255,255,.35);
    text-transform: uppercase; letter-spacing: .05em;
  }
  .cert-sign { text-align: right; }
  .cert-sign .cs-line { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.3rem; color: #2a1d5e; border-bottom: 1px solid #b9b09a; padding-bottom: 4px; min-width: 160px; }
  .cert-sign .cs-name { font-size: .72rem; color: #9aa0b0; margin-top: 4px; letter-spacing: .04em; }

  .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 28px; }
  .btn { padding: 12px 24px; border-radius: 11px; font-family: inherit; font-weight: 700; font-size: .9rem; cursor: pointer; border: 1px solid var(--border); transition: all .2s; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; }
  .btn-primary { background: linear-gradient(135deg, var(--accent2), var(--accent)); color: #fff; border-color: transparent; }
  .btn-primary:hover { filter: brightness(1.08); transform: translateY(-2px); }
  .btn-ghost { background: var(--surface); color: var(--text); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn:disabled { opacity: .5; cursor: not-allowed; }

  .state-msg { text-align: center; padding: 80px 20px; color: var(--muted); }
  .state-msg h2 { font-family: 'Syne', sans-serif; color: var(--text); margin-bottom: 10px; }

  @media print {
    body { background: #fff; padding: 0; }
    .blob, .topbar, .verify-banner, .actions { display: none !important; }
    .cert { box-shadow: none; border: none; }
    @page { size: landscape; margin: 12mm; }
  }

  @media (max-width: 640px) {
    .cert { padding: 36px 24px; }
    .cert-title { font-size: 2rem; }
    .cert-name { font-size: 1.8rem; min-width: 0; }
    .cert-course { font-size: 1.15rem; }
    .cert-footer { flex-direction: column; align-items: center; text-align: center; }
    .cert-meta, .cert-sign { text-align: center; }
  }
</style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="wrap">
    <div class="topbar">
      <a href="index.html" class="logo"><span class="logo-icon">DF</span>Decentra<span>Force</span></a>
      <a href="index.html" class="btn btn-ghost">← Home</a>
    </div>

    <div id="verifyBanner" class="verify-banner load">⏳ Verifying certificate…</div>

    <!-- Loading / error states -->
    <div id="stateMsg" class="state-msg" style="display:none;"></div>

    <!-- Certificate -->
    <div id="certCard" class="cert" style="display:none;">
      <div class="cert-inner">
        <div class="cert-brand"><span class="cb-icon">DF</span>Decentra<span class="cb-accent">Force</span></div>
        <div class="cert-kicker">Certificate of Completion</div>
        <div class="cert-title">Certificate of Achievement</div>

        <div class="cert-sub">This is proudly presented to</div>
        <div class="cert-name" id="certName">—</div>

        <div class="cert-sub2">for successfully completing the course</div>
        <div class="cert-course" id="certCourse">—</div>

        <div class="cert-footer">
          <div class="cert-meta">
            <div class="cm-label">Date Issued</div>
            <div class="cm-value" id="certDate">—</div>
            <div class="cm-label" style="margin-top:12px;">Certificate ID</div>
            <div class="cm-value" id="certCode">—</div>
          </div>
          <div class="cert-seal">Decentra<br>Force<br>★ Verified ★</div>
          <div class="cert-sign">
            <div class="cs-line">DecentraForce</div>
            <div class="cs-name">Authorized Signatory</div>
          </div>
        </div>
      </div>
    </div>

    <div class="actions" id="certActions" style="display:none;">
      <button class="btn btn-primary" id="btnDownload" onclick="downloadCertificate()">⬇ Download PNG</button>
      <button class="btn btn-ghost" onclick="window.print()">🖨 Print / Save PDF</button>
      <button class="btn btn-ghost" id="btnCopy" onclick="copyVerifyLink()">🔗 Copy verification link</button>
      <a class="btn btn-ghost" href="my-courses.html">My Courses</a>
    </div>
  </div>

<script>
  const params = new URLSearchParams(window.location.search);
  const code = (params.get('code') || '').trim();

  function showState(html) {
    const el = document.getElementById('stateMsg');
    el.innerHTML = html; el.style.display = '';
  }

  async function verify() {
    const banner = document.getElementById('verifyBanner');
    if (!code) {
      banner.className = 'verify-banner bad';
      banner.textContent = '✕ No certificate code provided.';
      showState('<h2>Certificate not found</h2><p>Add a valid <code>?code=</code> to the URL, or open your certificate from <a href="my-courses.html" style="color:var(--accent)">My Courses</a>.</p>');
      return;
    }
    try {
      const res  = await fetch(`/api/_public/verify-certificate?code=${encodeURIComponent(code)}`);
      const data = await res.json();
      if (data.success && data.valid && data.certificate) {
        const c = data.certificate;
        document.getElementById('certName').textContent   = c.recipient_name || 'Learner';
        document.getElementById('certCourse').textContent = c.course_title || 'Course';
        document.getElementById('certCode').textContent   = c.cert_code;
        document.getElementById('certDate').textContent   = c.issued_at
          ? new Date(c.issued_at).toLocaleDateString(undefined, { year:'numeric', month:'long', day:'numeric' }) : '';
        banner.className = 'verify-banner ok';
        banner.innerHTML = '✓ Verified — this is an authentic certificate issued by DecentraForce.';
        document.getElementById('certCard').style.display = '';
        document.getElementById('certActions').style.display = '';
        document.title = `${c.recipient_name || 'Certificate'} — DecentraForce Certificate`;
      } else {
        banner.className = 'verify-banner bad';
        banner.textContent = '✕ This certificate could not be verified.';
        showState(`<h2>Invalid certificate</h2><p>No certificate matches the code <strong>${escapeHtml(code)}</strong>.</p>`);
      }
    } catch(e) {
      banner.className = 'verify-banner bad';
      banner.textContent = '✕ Verification failed. Please try again.';
      showState('<h2>Something went wrong</h2><p>We could not reach the verification service. Please retry shortly.</p>');
    }
  }

  function escapeHtml(s) { return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

  async function downloadCertificate() {
    const card = document.getElementById('certCard');
    const btn  = document.getElementById('btnDownload');
    btn.disabled = true; btn.textContent = 'Rendering…';
    try {
      const canvas = await html2canvas(card, { scale: 2, backgroundColor: null, useCORS: true });
      const link = document.createElement('a');
      link.download = `DecentraForce-Certificate-${code}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    } catch(e) {
      alert('Could not generate the image. Use “Print / Save PDF” instead.');
    } finally {
      btn.disabled = false; btn.textContent = '⬇ Download PNG';
    }
  }

  function copyVerifyLink() {
    const url = `${location.origin}/certificate.html?code=${encodeURIComponent(code)}`;
    navigator.clipboard.writeText(url).then(() => {
      const btn = document.getElementById('btnCopy');
      const orig = btn.textContent;
      btn.textContent = '✓ Copied!';
      setTimeout(() => { btn.textContent = orig; }, 1800);
    });
  }

  verify();
</script>
</body>
</html>
